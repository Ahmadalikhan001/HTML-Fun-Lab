<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Students Table</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .25);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #2563eb;
            color: white;
            position: sticky;
            top: 0;
        }

        th,
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background: #f4f4f4;
        }

        tbody tr:hover {
            background: #dbeafe;
        }

        .selected {
            background: #16a34a;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .pending {
            background: #f59e0b;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .rejected {
            background: #dc2626;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🎓 Student Performance Report (100 Students)</h1>

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Country</th>
                    <th>Student Name</th>
                    <th>Score</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="students"></tbody>

        </table>

    </div>

    <script>

        const countries = [
            "Pakistan", "Malaysia", "Canada", "USA", "UK", "Australia", "Germany",
            "France", "Italy", "Japan", "China", "India", "Turkey", "Brazil",
            "Spain", "Russia", "Singapore", "UAE", "South Korea", "New Zealand"
        ];

        const names = [
            "Ahmad Ali Khan", "John Smith", "Emily Johnson", "Ali Hassan", "Sophia Wilson",
            "Oliver Brown", "Emma Davis", "Noah Anderson", "Haruto Tanaka", "Wei Zhang",
            "Rahul Sharma", "Lucas Silva", "Carlos Garcia", "Ivan Petrov", "Grace Lim",
            "Omar Hassan", "Jack Wilson", "Mehmet Kaya", "Min Kim", "Nur Aisyah"
        ];

        const tbody = document.getElementById("students");

        for (let i = 1; i <= 100; i++) {

            let country = countries[Math.floor(Math.random() * countries.length)];
            let name = names[Math.floor(Math.random() * names.length)];
            let score = Math.floor(Math.random() * 51) + 50;

            let status = "Selected";
            let cls = "selected";

            if (score < 60) {
                status = "Rejected";
                cls = "rejected";
            }
            else if (score < 75) {
                status = "Pending";
                cls = "pending";
            }

            tbody.innerHTML += `
<tr>
<td>${i}</td>
<td>${country}</td>
<td>${name}</td>
<td>${score}</td>
<td><span class="${cls}">${status}</span></td>
</tr>`;
        }

    </script>

</body>

</html>
