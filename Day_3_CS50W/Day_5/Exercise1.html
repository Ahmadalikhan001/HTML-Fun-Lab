<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Practice</title>
    <style>
        #container {
            background-color: lightblue;
            margin: 20px;
            height: 600px;
            width: 600px;
            display: flex;
            justify-content: center;
            align-items: centers;
        }

        #container>div {
            height: 150px;
            width: 300px;
            color: brown;
            background-color: rebeccapurple;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-size: 12px;

        }

        #container>div>h1 {
            display: flex;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: black;


        }

        button {
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div id="container">
        <div>
            <h1>
                This is just a card
            </h1>
            <p>Price:53$</p>
            <button id="btn">Bye</button>
        </div>
    </div>
</body>

</html>
