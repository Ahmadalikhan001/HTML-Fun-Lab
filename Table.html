<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3*3 Table.</title>
    <style>
        table {
            border-collapse: collapse;
            border: 2px solid black;
            padding: 10px;
            margin: 20px;
        }

        th,
        td {
            border: 2px solid black;
            padding: 10px;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
            <th>Header 3</th>
        </tr>
        <tr>
            <td>First Row</td>
            <td>2nd Row</td>
            <td>3rd Row</td>
        </tr>
        <tr>
            <td>4th Row</td>
            <td>5th Row</td>
            <td>6th Row</td>
        </tr>
    </table>
</body>

</html>
