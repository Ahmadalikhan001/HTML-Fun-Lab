<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in Html</title>
    <style>
        body {
            margin: 10px;
            background-color: aqua;

        }

        table {
            border-collapse: collapse;
            padding: 2px;
            margin: 6px;
        }

        th,
        td {
            border: 2px solid black;
            padding: 10px;

        }
    </style>
</head>

<body>
    <h1>Table in Html</h1>
    <table>
        <tr>
            <th>Heading One</th>
            <th>Heading Two</th>
            <th>Heading Three</th>
        </tr>
        <tr>
            <td>
                2nd Row
            </td>
            <td>2nd Item</td>
            <td>3nd Item</td>
        </tr>
    </table>
</body>

</html>
