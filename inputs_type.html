<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html input types.</title>
</head>

<body>
    <h1>color input type in html</h1>
    <input type="color">
    <h1>range input type in html</h1>
    <input type="range">
    <h1>file input type in html</h1>
    <input type="file">
    <h1>telephone input type in html</h1>
    <input type="tel" pattern="[0-9]+">
    <h1>Url input type in html</h1>
    <input type="url">
    <h1>search input type in html</h1>
    <input type="search">
    <h1>time input type in html</h1>
    <input type="time">
    <h1>date input type in html</h1>
    <input type="date">
    <h1>month input type in html</h1>
    <input type="month">
    <h1>week input type in html</h1>
    <input type="week">
</body>

</html>
