<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition_Exercise</title>
    <style>
        button {
            background-color: aqua;
            border-radius: 20px;
            height: 36px;
            width: 105px;
            color: brown;
            font-weight: bold;
            border: none;
            transition: 3s;


        }

        button:hover {
            background-color: blueviolet;
            color: rgb(241, 248, 96);
            box-shadow: 5px 5px 5px rgba(236, 10, 10, 0.3);
        }
    </style>
</head>

<body>
    <button>Join Now</button>

</body>

</html>
