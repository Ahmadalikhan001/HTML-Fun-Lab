<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html buttons</title>
    <style>
        .subscrib,
        .Skip {
            color: rgb(3, 51, 51);
            background-color: rgb(74, 207, 125);
            font-weight: bold;
            border-radius: 20px;
            height: 36px;
            width: 115px;
            border: 1px solid rgb(3, 51, 51);
            cursor: pointer;
            margin: 10px;
        }

        .Skip {
            background-color: rgb(238, 139, 139);
            color: rgb(25, 103, 77);
        }

        .Skip:hover {
            background-color: rgb(88, 156, 156);
            color: rgb(237, 47, 5);
        }

        .subscrib:hover {
            background-color: rgb(194, 249, 249);
            color: rgb(4, 155, 4);
        }
    </style>
</head>

<body>

    <p>This is my First Paragraph with out class or Id.</p>
    <button class="subscrib">subscribe Now!</button>
    <button class="Skip">Skip</button>
</body>

</html>
