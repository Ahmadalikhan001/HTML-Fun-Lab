<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Id and class in html</title>\
    <style>
        h1 {
            color: blue;

        }

        #Green {
            color: green;
        }

        .Red {
            color: red;
        }
    </style>
</head>

<body>
    <h1>This is Heading One with out any Id and Class </h1>
    <h1 id="Green">This is the Green Heading and also use id with the name of Green. </h1>
    <h1 class="Red">This is the Red heading With the Class of Red.</h1>
    <h1>This is the 2nd Heading with the out any id or class. </h1>

</body>

</html>
