<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design.
    </title>
    <style>
        body {
            width: 400px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background-color: lightblue;
            padding: 10px
        }

        @media(max-width:600px) {
            body {
                width: 100%;
            }
        }

        table {
            background-color: aquamarine;
            border-collapse: collapse;
            flex-wrap: wrap;
        }

        tr,
        th,
        td {
            border: 2px solid brown;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>
    <table>
        <h1>important Points.</h1>
        <tr>
            <th>Divice Name</th>
            <th>minimum Size of Screen</th>
            <th>maxismum Size of Screen</th>
        </tr>
        <tr>
            <td>small mobile</td>
            <td>360px</td>
            <td>480px,</td>
        </tr>
        <tr>
            <td>large mobile</td>
            <td>481px</td>
            <td>767px,</td>
        </tr>
        <tr>
            <td>Teblat</td>
            <td>768px</td>
            <td>991px,</td>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>992px</td>
            <td>1199px,</td>
        </tr>
        <tr>
            <td>Distop</td>
            <td>1200px</td>
            <td>++</td>
        </tr>
    </table>
</body>

</html>
