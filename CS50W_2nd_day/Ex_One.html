<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise_One</title>
    <style>
        body {
            background-color: aquamarine;
            margin: 10px;

        }

        body>p {
            color: blue;
            text-align: center;
        }

        .Card {
            height: 320px;
            width: 300px;
            background-color: blueviolet;
            justify-content: center;
            padding: 10px;
            border-radius: 15px;
            text-align: center;

        }

        .Subscribe,
        .Skip {
            height: 30px;
            width: 105px;
            color: white;
            background-color: rgb(235, 22, 22);
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: color 5s;

        }

        .Subscribe:hover,
        .Skip:hover,
        .Buy:hover,
        .Amazon:hover,
        .favorite:hover {
            color: rgb(10, 10, 10);
            background-color: rgb(45, 186, 20);
        }

        .Buy,
        .Amazon {
            color: rgb(255, 255, 255);
            background-color: rgb(241, 90, 15);
            height: 26px;
            width: 70px;
            border-radius: 20px;
            border: none;
            transition: 3s;
        }

        .favorite {
            color: rgb(250, 250, 250);
            background-color: rgb(241, 90, 15);
            height: 26px;
            width: 110px;
            border-radius: 20px;
            border: none;
            transition: 3s;
        }
    </style>
</head>

<body>
    <p>This is my First Paragraph with out class or Id.</p>
    <button class="Subscribe">Subscribe</button>
    <button class="Skip">Skip Now</button>
    <hr>
    <div class="Card">
        <h1>Black Niki Shoes.</h1>
        <p>Price: $99.99</p>
        <img src="blackNikiShoes.png" alt="Black Niki Shoes image." height="170px" width="250px"><br>
        <button class="Buy">Buy Now</button>
        <button class="favorite">Add to Favorites</button>
        <button class="Amazon">Amazon</button>

    </div>

</body>

</html>
