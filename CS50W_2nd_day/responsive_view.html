<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive view
    </title>
</head>
<style>
    * {
        box-sizing: content-box;
    }

    .container {
        width: 400px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .container div {
        background-color: lightblue;
        padding: 10px;
    }

    @media(max-width:500px) {
        .container {
            width: 100%;
        }
    }
</style>

<body>
    <div class="container">
        <div>div One</div>
        <div>div Two</div>
        <div>div Three</div>
        <div>div Four</div>
        <div>div Five</div>
        <div>div Six</div>
    </div>
</body>

</html>
