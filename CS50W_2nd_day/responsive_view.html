<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive view
    </title>
</head>
<style>
    div {
        width: 400px;
    }

    @media(max-width:600px) {
        div {
            width: 100%;
        }
    }
</style>

<body>
    <div class="container">
        <div>div One </div>
        <div>div Two </div>
        <div>div Three </div>
        <div>div Four </div>
        <div>div Five </div>
        <div>div Six </div>
    </div>
</body>

</html>
