<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>responsive design</title>
    <style>
        @media(min-width:600px) {
            body {
                background-color: brown;
                color: aqua;
            }
        }

        @media (max-width:599px) {
            body {
                background-color: aqua;
                color: brown;
            }

        }
    </style>
</head>

<body>
    <p>
        meta name="viewport" content="width=device-width, initial-scale=1.0"

    </p>
    <h1>Media Queries.</h1>


</body>

</html>
