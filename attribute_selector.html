<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector Use in Html.</title>
    <!-- here we are using the attribute selector in html. In this example we have a list of links and we are targeting the link which has the href attribute value of "https://facebook.com" and we are changing its color to red. -->
    <style>
        a[href="https://facebook.com"] {
            color: red;
        }
    </style>
</head>

<body>
    <ul>
        <li> <a href="https://google.com">Google</a> </li>
        <li> <a href="https://facebook.com">Facebook</a> </li>
        <li> <a href="https://amazon.com">Amazon</a></li>
    </ul>
</body>

</html>
