<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo Class in Html.</title>
    <style>
        button {
            background-color: rgb(235, 215, 100);
            color: purple;
            border: none;
            height: 70px;
            width: 100px;
            font-weight: bold;
            border-radius: 10px;
        }

        button:hover {
            background-color: rgb(72, 187, 225);
            color: blue;
            color: white;
        }
    </style>
</head>

<body>
    <button>Click Me!</button>
</body>

</html>
