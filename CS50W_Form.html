<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form1</title>
</head>

<body>
    <dev>

        <label for="name">Name: </label>
        <input name="name" type="text" placeholder="Enter your name">
        <label for="password">Password: </label>
        <input name="password" type="password" placeholder="Enter your password">
    </dev><br>
    <dev>
        Favorite Color:
        <input type="radio" name="favoriteColor" value="Red">Red
        <input type="radio" name="favoriteColor" value="Green">Green
        <input type="radio" name="favoriteColor" value="Blue">Blue
        <input type="radio" name="favoriteColor" value="Other">Other

    </dev>
    <dev>
        Select Country:
        <input name="Country" list="Countries" placeholder="Select your Country">
        <datalist id="Countries">
            <option value="Pakistan">
            <option value="USA">
            <option value="UK">
            <option value="Canada">
            <option value="Australia">
        </datalist>
    </dev>

</body>

</html>
