<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Exercise</title>
    <style>
        * {
            padding: 0;
            margin: 0;

        }

        .div1 {
            background-color: rgb(224, 143, 224);
            padding: 20px;
            margin: 20px;
            height: 300px;
            width: 300px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn1 {
            margin: 10px;
            color: antiquewhite;
            background-color: rgb(2, 104, 96);
            width: 90px;
            height: 26px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            font-family: Arial;
            font-weight: bold;


        }

        .btn1:hover {
            box-shadow: 5px 5px 20px rgb(255, 71, 71);
            transition: 3s;
        }
    </style>
</head>

<body>
    <div class="div1">
        <h>Shadow Property</h>
        <button class="btn1">Click Me!</button>
    </div>

</body>

</html>
