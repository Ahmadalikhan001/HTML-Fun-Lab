<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in Html</title>
    <style>
        body {
            margin: 10px;

        }

        div {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            height: 400px;
            width: 400px;
            direction: row;
            background-color: aquamarine;
            border-radius: 20px;
            padding: 20px;
        }
    </style>
</head>

<body>
    <h1>Forms in Html</h1>
    <div>
        <form>
            <label>Name:</label>
            <input type="text" placeholder="Name">
            <label>Password</label>
            <input type="password" placeholder="password">
            <label>Email</label><input type="text" placeholder="Email" aria-placeholder="Email">
            <input type="date" placeholder="enter the current date" required>
            <input type="radio" required>
            <label>Aged</label>
            <input type="radio">
            <label>Under Age</label>
            <input type="radio">
            <label>25 - 30</label>
            <label>CheckBox</label>
            <input type="checkbox">
            <label>CheckBox2</label>
            <input type="checkbox">
            <label>Put comment Below</label>
            <textarea maxlength="20" minlength="3"></textarea>
            <label>Options</label>
            <select>
                <option>Select country</option>
                <option>Pakistan</option>
                <option>India</option>
                <option>Israil</option>
                <option>USA</option>
            </select>

        </form>
    </div>
</body>

</html>
